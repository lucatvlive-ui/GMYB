<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heutiges Workout - Gym Makes You Better</title>

    <!-- CSS einbinden -->
    <link rel="stylesheet" href="lib/style.css">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <!-- JavaScript einbinden -->
    <script src="lib/script.js"></script>
    <!-- 🌐 Cloud Sync für Multi-Device Support -->
    <script src="lib/cloud-sync.js"></script>
</head>
<body>
   <div class="logo">
  <a href="index.html">
    <img src="bilder/Logo_white.png" width="200" height="auto" alt="Logo">
  </a>
</div>

<div class="time-display" id="time-display">
  <span id="date-time">--:--:--</span>
</div>

<div class="user-info">
  <span id="user-greeting">Willkommen!</span>
  <button class="profile-btn" onclick="window.location.href='Profil.html'">👤 Profil</button>
  <button class="logout-btn" onclick="logout()">Abmelden</button>
</div>

<div class="dashboard2">
  <div class="card2">
    <h2>Heutiges Workout</h2>

    <div class="workout-form">
      <h3>Übung hinzufügen</h3>
      <form onsubmit="addExercise(event)">
        <div class="form-group">
          <label>Übung (aus Trainingsplan für heute)</label>
          <select id="exercise-select" required>
            <option value="">-- Übung auswählen --</option>
          </select>
          <small style="color: #999; margin-top: 5px; display: block;">Zeigt nur Übungen für heute an</small>
        </div>

        <div class="form-group">
          <label>Gewicht (kg)</label>
          <input type="number" id="exercise-weight" step="0.5" placeholder="z.B. 80 (dein Trainingsgewicht)" />
        </div>

        <div class="form-group">
          <label>Wiederholungen</label>
          <input type="number" id="exercise-reps" required placeholder="z.B. 10">
        </div>

        <div class="form-group">
          <label>Sätze</label>
          <input type="number" id="exercise-sets" required value="1" placeholder="z.B. 3">
        </div>

        <div class="form-group">
          <label>Notizen</label>
          <textarea id="exercise-notes" placeholder="Notizen zur Übung..."></textarea>
        </div>

        <div class="form-group">
          <label>Nicht so gute Wiederholungen</label>
          <input type="number" id="exercise-bad-reps" value="0" min="0" placeholder="Wiederholungen die nicht gut waren">
        </div>

        <button type="submit" class="login-btn">Übung hinzufügen</button>
      </form>
    </div>

    <h3 style="margin-top: 30px;">Heutige Übungen</h3>
    <div id="todays-exercises" class="exercises-list"></div>

    <div style="display: flex; gap: 10px; margin-top: 20px;">
      <button onclick="openTimerModal()" class="login-btn" style="width: 100%; background: #ff9800;">⏱️ Timer</button>
      <button onclick="saveWorkout()" class="login-btn" style="width: 100%; background: #4CAF50;">💾 Speichern</button>
      <button onclick="clearTodayExercises()" class="login-btn" style="width: 100%; background: #ff6b6b;">🗑️ Alle löschen</button>
    </div>
  </div>
</div>

<!-- Timer Modal -->
<div id="timer-modal" class="modal">
  <div class="modal-content">
    <span class="close-modal" onclick="closeTimerModal()">&times;</span>
    <h2>⏱️ Workout Timer</h2>
    
    <div style="text-align: center; margin: 30px 0;">
      <div id="timer-display" style="font-size: 48px; color: #4CAF50; font-weight: bold; font-family: monospace;">00:00</div>
    </div>
    
    <div class="timer-controls" style="display: flex; gap: 10px; justify-content: center;">
      <button onclick="startTimer()" class="login-btn" style="background: #4CAF50; width: 100px;">Start</button>
      <button onclick="pauseTimer()" class="login-btn" style="background: #ff9800; width: 100px;">Pause</button>
      <button onclick="resetTimer()" class="login-btn" style="background: #ff6b6b; width: 100px;">Reset</button>
    </div>

    <div class="form-group" style="margin-top: 20px;">
      <label>Zeit (Sekunden):</label>
      <input type="number" id="timer-input" value="60" min="1" max="3600" placeholder="60">
    </div>

    <button onclick="applyTimerSeconds()" class="login-btn" style="width: 100%; margin-top: 10px;">Zeit setzen</button>
  </div>
</div>

    <img class="gym-background" src="bilder/gym_background.png" alt="GYM_BACKGROUND">

<style>
.workout-form {
  background: #2a2a2a;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.workout-form textarea {
  width: 100%;
  min-height: 70px;
  padding: 10px;
  background-color: #1a1a1a;
  border: 1px solid #444;
  border-radius: 6px;
  color: white;
  font-family: Arial, sans-serif;
  resize: vertical;
  box-sizing: border-box;
  font-size: 14px;
}

.workout-form textarea:focus {
  outline: none;
  border-color: #4CAF50;
  background-color: #222;
}

.exercises-list {
  max-height: 400px;
  overflow-y: auto;
}

.exercise-card {
  background: #1a1a1a;
  padding: 15px;
  margin: 10px 0;
  border-radius: 8px;
  border-left: 4px solid #4CAF50;
  display: flex;
  justify-content: space-between;
  align-items: start;
  gap: 10px;
}

.exercise-content {
  flex: 1;
}

.exercise-content h4 {
  margin: 0 0 8px 0;
  color: #4CAF50;
}

.exercise-stats {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin: 10px 0;
  font-size: 13px;
  color: #999;
}

.exercise-stats span {
  padding: 5px 10px;
  background: #2a2a2a;
  border-radius: 4px;
}

.exercise-notes {
  margin-top: 10px;
  padding: 10px;
  background: #2a2a2a;
  border-radius: 4px;
  font-size: 13px;
  color: #bbb;
}

.exercise-delete {
  background: #ff6b6b;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
  white-space: nowrap;
}

.exercise-delete:hover {
  background: #ff5252;
}

.exercise-timer-btn {
  background: #4CAF50;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
  white-space: nowrap;
}

.exercise-timer-btn:hover {
  background: #45a049;
}
</style>

<script>
  window.addEventListener('DOMContentLoaded', function() {
    updateUserGreeting();
    loadTodayWorkout();
    updateTimeDisplay();
    setInterval(updateTimeDisplay, 1000);
  });
</script>

</body>
</html>
