<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Historie - Gym Makes You Better</title>
    <link rel="stylesheet" href="lib/style.css">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="lib/script.js"></script>
</head>
<body>

<div class="logo">
  <a href="index.html">
    <img src="bilder/Logo_white.png" width="200" height="auto" alt="Logo">
  </a>
</div>

<div class="user-info">
  <span id="user-greeting">Willkommen!</span>
  <button class="profile-btn" onclick="window.location.href='Profil.html'">👤 Profil</button>
  <button class="logout-btn" onclick="logout()">Abmelden</button>
</div>

<div class="history-container">
  <div class="history-card">
    <h1>Workout Historie</h1>
    
    <div class="calendar-controls">
      <button onclick="previousMonth()" class="calendar-btn">← Vorheriger Monat</button>
      <h2 id="calendar-month">März 2026</h2>
      <button onclick="nextMonth()" class="calendar-btn">Nächster Monat →</button>
    </div>

    <div class="calendar-grid" id="calendar"></div>

    <div class="workout-details">
      <h3>Workouts am <span id="selected-date">heute</span></h3>
      <div id="workouts-list" class="workouts-list"></div>
    </div>

    <button onclick="window.location.href='index.html'" class="login-btn" style="background: #666; margin-top: 20px; width: 100%;">Zurück</button>
  </div>
</div>

<img class="gym-background" src="bilder/gym_background.png" alt="GYM_BACKGROUND">

</body>
</html>
