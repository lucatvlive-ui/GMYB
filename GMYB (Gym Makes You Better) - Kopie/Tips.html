    <style>
        .tips-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 40px;
            margin-top: 100px;
        }

        .muscle-group {
            background: #1a1a1a;
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #FF6B35;
            cursor: pointer;
            transition: 0.3s;
        }

        .muscle-group:hover {
            background: #222;
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(255, 107, 53, 0.3);
        }

        .muscle-group h2 {
            margin-top: 0;
            color: #FF6B35;
            font-size: 24px;
        }

        .muscle-group p {
            color: #ccc;
            margin: 10px 0;
            font-size: 14px;
        }

        .tips-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
        }

        .tips-modal-content {
            background: #1a1a1a;
            margin: 5% auto;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            max-height: 70vh;
            overflow-y: auto;
            border: 2px solid #FF6B35;
        }

        .close-tips {
            color: #FF6B35;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close-tips:hover {
            color: #fff;
        }

        .tip-item {
            background: #2a2a2a;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            border-left: 4px solid #FF6B35;
        }

        .tip-item h4 {
            margin-top: 0;
            color: #FF6B35;
        }

        .tip-item .athlete {
            font-style: italic;
            color: #4CAF50;
            font-size: 12px;
            margin-top: 10px;
        }

        .tip-item p {
            margin: 8px 0;
            color: #ddd;
            line-height: 1.5;
        }

    // Tips Container füllen
    function loadTips() {
        const container = document.getElementById('tipsContainer');
        container.innerHTML = '';
        
        for (const [muscleGroup, data] of Object.entries(tipsData)) {
            const card = document.createElement('div');
            card.className = 'muscle-group';
            card.onclick = () => openTipsModal(muscleGroup);
            
            const tipsCount = data.tips.length;
            card.innerHTML = `
                <h2>${data.emoji} ${muscleGroup}</h2>
                <p>${tipsCount} Tipps von Profisportlern</p>
                <p style="color: #FF6B35; font-size: 12px; margin-top: 15px;">👆 Klick für mehr...</p>
            `;
            
            container.appendChild(card);
        }
    }

    function openTipsModal(muscleGroup) {
        const data = tipsData[muscleGroup];
        const modal = document.getElementById('tipsModal');
        const title = document.getElementById('modalTitle');
        const content = document.getElementById('modalTipsContent');
        
        title.textContent = `${data.emoji} ${muscleGroup} Tipps`;
        content.innerHTML = '';
        
        data.tips.forEach(tip => {
            const tipDiv = document.createElement('div');
            tipDiv.className = 'tip-item';
            tipDiv.innerHTML = `
                <h4>${tip.title}</h4>
                <p>${tip.description}</p>
                <div class="athlete">💬 ${tip.athlete}</div>
            `;
            content.appendChild(tipDiv);
        });
        
        modal.style.display = 'block';
    }

    function closeTipsModal() {
        document.getElementById('tipsModal').style.display = 'none';
    }

    // Modal schließen wenn außerhalb angeklickt wird
    window.onclick = function(event) {
        const modal = document.getElementById('tipsModal');
        if (event.target == modal) {
            modal.style.display = 'none';
        }
    }

    // Tips beim Laden anzeigen
    document.addEventListener('DOMContentLoaded', loadTips);
</script>

</body>
