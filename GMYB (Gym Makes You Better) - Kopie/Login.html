<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gym Makes You Better</title>

    <!-- CSS -->
    <link rel="stylesheet" href="lib/style.css">
    <!-- Firebase (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <!-- Google Sign-In -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- JavaScript -->
    <script src="lib/script.js"></script>
</head>
<body>
  
<div class="logo">
  <img src="bilder/Logo_white.png" width="200" height="auto" alt="Logo">
</div>

<!-- Login Container -->
<div id="login-container" class="login-container">
  <div class="login-box">
    <h1>Gym Makes You Better</h1>
    <p class="login-subtitle">Melden Sie sich an</p>
    
    <!-- Login Form -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">Email oder Benutzername</label>
        <input type="text" id="email" name="email" required placeholder="name@example.com">
      </div>
      
      <div class="form-group">
        <label for="password">Passwort</label>
        <input type="password" id="password" name="password" required placeholder="Passwort eingeben">
      </div>
      
      <div class="form-group remember">
        <input type="checkbox" id="remember" name="remember">
        <label for="remember">Angemeldet bleiben</label>
      </div>
      
      <button type="submit" class="login-btn">Anmelden</button>
    </form>
    
    <!-- Google Sign-In -->
    <div id="g_id_onload"
         data-client_id="473419703106-abc123.apps.googleusercontent.com"
         data-callback="handleGoogleSignIn">
    </div>
    <div class="g_id_signin" data-type="standard" data-size="large" data-theme="dark" style="margin-top: 20px; display: flex; justify-content: center;"></div>
    
    <!-- Error Message -->
    <div id="error-message" class="error-message"></div>
    
    <!-- Registration Link -->
    <div class="login-footer">
      <p>Noch kein Konto? <a href="#" onclick="showSignup(event)">Registrieren</a></p>
    </div>
  </div>
</div>

<!-- Signup Form (Hidden by default) -->
<div id="signup-container" class="login-container" style="display:none;">
  <div class="login-box">
    <h1>Registrierung</h1>
    <p class="login-subtitle">Erstellen Sie ein Konto</p>
    
    <form id="signup-form" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label for="signup-name">Vollständiger Name</label>
        <input type="text" id="signup-name" name="name" required placeholder="Max Mustermann">
      </div>
      
      <div class="form-group">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" name="email" required placeholder="name@example.com">
      </div>
      
      <div class="form-group">
        <label for="signup-password">Passwort</label>
        <input type="password" id="signup-password" name="password" required placeholder="Mindestens 6 Zeichen">
      </div>
      
      <div class="form-group">
        <label for="signup-password-confirm">Passwort wiederholen</label>
        <input type="password" id="signup-password-confirm" name="password-confirm" required placeholder="Passwort bestätigen">
      </div>
      
      <button type="submit" class="login-btn">Registrieren</button>
    </form>
    
    <!-- Error Message -->
    <div id="signup-error-message" class="error-message"></div>
    
    <!-- Back to Login Link -->
    <div class="login-footer">
      <p><a href="#" onclick="showLogin(event)">Zurück zum Login</a></p>
    </div>
  </div>
</div>

<img class="gym-background" src="bilder/gym_background.png" alt="GYM_BACKGROUND">
</body>
</html>
